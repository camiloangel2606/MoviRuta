services:
  mysql:
    image: mysql:8.0
    container_name: moviruta-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: moviruta_entrega2
      MYSQL_USER: movi_user
      MYSQL_PASSWORD: movi_pass_123
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init-sql:/docker-entrypoint-initdb.d
    networks:
      - moviruta-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 10

  mongodb:
    image: mongo:7
    container_name: moviruta-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    networks:
      - moviruta-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10

  ms-security:
    build:
      context: ./Backend/MoviRuta
      dockerfile: Dockerfile
    container_name: moviruta-ms-security
    env_file:
      - ./Backend/MoviRuta/.env
    environment:
      FRONTEND_URL: http://localhost:4200
    ports:
      - "5050:5050"
    networks:
      - moviruta-network

  ms-nest:
    build:
      context: ./Backend/MoviRutaNest/backend-moviruta-entrega2
      dockerfile: Dockerfile
    container_name: moviruta-ms-nest
    env_file:
      - ./Backend/MoviRutaNest/backend-moviruta-entrega2/.env
    environment:
      DB_HOST: mysql
      MS_SECURITY: http://ms-security:5050
    ports:
      - "3000:3000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - moviruta-network

  ms-chat:
    build:
      context: ./ms-chat
      dockerfile: Dockerfile
    container_name: moviruta-ms-chat
    env_file:
      - ./ms-chat/.env
    environment:
      MONGODB_URL: mongodb://mongodb:27017
      SECURITY_URL: http://ms-security:5050/api
    ports:
      - "4000:4000"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - moviruta-network

  ms-n8n-agents:
    build:
      context: ./ms-n8n-agents
      dockerfile: Dockerfile
    container_name: moviruta-ms-n8n-agents
    env_file:
      - ./ms-n8n-agents/.env
    environment:
      MONGODB_URL: mongodb://mongodb:27017
    ports:
      - "4001:4001"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - moviruta-network

  frontend:
    build:
      context: ./Frontend/Front-MoviRuta
      dockerfile: Dockerfile
    container_name: moviruta-frontend
    ports:
      - "4200:80"
    networks:
      - moviruta-network

networks:
  moviruta-network:
    driver: bridge

volumes:
  mysql-data:
  mongodb-data:
