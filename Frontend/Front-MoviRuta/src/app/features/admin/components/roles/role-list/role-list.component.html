<section class="page-shell">
  <header class="page-header">
    <div class="page-heading">
      <span class="page-kicker">Administracion</span>
      <h1 class="page-title">Roles operativos</h1>
      <p class="page-description">Administra los perfiles de acceso para cada tipo de operador.</p>
    </div>

    <a mat-flat-button color="primary" routerLink="/admin/roles/new">
      <mat-icon>add</mat-icon>
      Nuevo rol
    </a>
  </header>

  <div class="app-data-table">
    <div class="app-table-toolbar">
      <mat-form-field appearance="outline" class="app-search">
        <mat-label>Buscar rol</mat-label>
        <input matInput #searchInput (input)="onSearch(searchInput.value)" placeholder="Nombre o descripcion" />
        <mat-icon matSuffix>search</mat-icon>
      </mat-form-field>

      <span class="app-badge app-badge-success">{{ dataSource.data.length }} roles</span>
    </div>

    <div class="table-state" *ngIf="loading">Cargando roles...</div>

    <table mat-table [dataSource]="dataSource" matSort *ngIf="!loading">
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Nombre</th>
        <td mat-cell *matCellDef="let role">
          <div class="role-name-cell">
            <span class="role-dot"></span>
            <strong>{{ role.name }}</strong>
          </div>
        </td>
      </ng-container>

      <ng-container matColumnDef="description">
        <th mat-header-cell *matHeaderCellDef>Descripcion</th>
        <td mat-cell *matCellDef="let role">{{ role.description }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Acciones</th>
        <td mat-cell *matCellDef="let role">
          <div class="app-table-actions">
            <a mat-stroked-button color="primary" [routerLink]="['/admin/roles/edit', role.id]">
              <mat-icon>edit</mat-icon>
              Editar
            </a>
            <button mat-stroked-button color="warn" (click)="deleteRole(role)">
              <mat-icon>delete</mat-icon>
              Eliminar
            </button>
          </div>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>

    <mat-paginator [pageSize]="8" [pageSizeOptions]="[8, 16, 24]"></mat-paginator>
  </div>
</section>
