<div class="profile-edit-container">
  <h3>📝 Editar Perfil</h3>

  <div *ngIf="error" class="alert alert-error">
    ❌ {{ error }}
  </div>
  <div *ngIf="success" class="alert alert-success">
    {{ success }}
  </div>

  <div *ngIf="loading" class="loading-state">
    <div class="spinner"></div>
    <p>Cargando tu perfil...</p>
  </div>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" *ngIf="!loading">
    <div class="form-group">
      <label for="phone">📱 Teléfono</label>
      <input
        id="phone"
        type="tel"
        formControlName="phone"
        placeholder="+57 300 123 4567"
        class="form-control"
      />
      <small>Opcional - Tu número de contacto</small>
    </div>

    <div class="form-group">
      <label for="photo">🖼️ Foto de Perfil (URL)</label>
      <input
        id="photo"
        type="url"
        formControlName="photo"
        placeholder="https://..."
        class="form-control"
      />
      <small>
        URL de la imagen de tu perfil
      </small>

      <div *ngIf="form.get('photo')?.value" class="photo-preview">
        <img 
          [src]="form.get('photo')?.value" 
          alt="Vista previa"
          (error)="onPhotoPreviewError($event)"
          (load)="onPhotoPreviewLoad($event)"
        />
      </div>
    </div>

    <button
      type="submit"
      [disabled]="saving || form.invalid"
      class="btn btn-primary"
    >
      {{ saving ? '⏳ Guardando...' : '💾 Guardar Cambios' }}
    </button>
  </form>
</div>
