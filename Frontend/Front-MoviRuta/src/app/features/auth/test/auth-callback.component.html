<div class="auth-callback-container">
  <div class="callback-card">
    <!-- Loading State -->
    <div *ngIf="loading" class="spinner"></div>

    <!-- Message -->
    <h2>{{ message }}</h2>

    <!-- Error Message -->
    <p *ngIf="error" class="error-message">
      {{ error }}
    </p>
  </div>
</div>
